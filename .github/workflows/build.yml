name: nameless iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set active Xcode path
        run: |
          set -euo pipefail
          XCODE_VERSION=$(python3 -c 'import json; d=json.load(open("versions.json")); print(d["xcode"])')
          XCODE_PATH="/Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer"
          if [ -d "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH"
          else
            echo "Xcode ${XCODE_VERSION} not found, using default"
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Create canonical source directory
        run: |
          set -euo pipefail
          sudo mkdir -p /Users/Shared
          sudo rm -rf /Users/Shared/telegram-ios
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Patch submodules for FFmpeg 7.x and LuxGram compat
        run: |
          set -euo pipefail
          SOURCE_DIR=/Users/Shared/telegram-ios
          sed -i '' '/reordered_opaque/d' \
            "$SOURCE_DIR/third-party/webrtc/webrtc/modules/video_coding/codecs/h264/h264_decoder_impl.cc"
          sed -i '' '/LuxSettingsUI/d' \
            "$SOURCE_DIR/submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen/BUILD"
          sed -i '' '/import LuxSettingsUI/d' \
            "$SOURCE_DIR/submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen/Sources/PeerInfoScreenSettingsActions.swift"
          sed -i '' 's/self.controller?.push(luxGramSettingsController(context: self.context))/break/' \
            "$SOURCE_DIR/submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen/Sources/PeerInfoScreenSettingsActions.swift"
          sed -i '' 's/PresentationResourcesSettings.nameless.withRenderingMode(.alwaysOriginal)/PresentationResourcesSettings.nameless?.withRenderingMode(.alwaysOriginal)/' \
            "$SOURCE_DIR/submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen/Sources/ListItems/PeerInfoScreenCommentItem.swift"
          sed -i '' 's/sgWebSettings\.global\.canGrant/(context.currentAppConfiguration.with { $0 }).sgWebSettings.global.canGrant/' \
            "$SOURCE_DIR/submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen/Sources/PeerInfoSettingsItems.swift"

      - name: Create CI build configuration
        run: |
          set -euo pipefail
          SOURCE_DIR=/Users/Shared/telegram-ios
          python3 -c "
import json
cfg = {
    'bundle_id': 'ph.telegra.Telegraph',
    'api_id': '35971841',
    'api_hash': '504a05393f81633f94c433502e9b09e6',
    'team_id': '',
    'app_center_id': '0',
    'is_internal_build': 'false',
    'is_appstore_build': 'false',
    'appstore_id': '0',
    'app_specific_url_scheme': 'tg',
    'premium_iap_product_id': '',
    'enable_siri': False,
    'enable_icloud': False,
    'sg_config': ''
}
with open('$SOURCE_DIR/build-system/ci-configuration.json', 'w') as f:
    json.dump(cfg, f, indent='\t')
print('Created ci-configuration.json')
"

      - name: Import fake certificates
        run: |
          cd /Users/Shared/telegram-ios
          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

      - name: Build the App
        run: |
          set -euo pipefail
          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"
          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          export APP_VERSION=$(python3 -c 'import json; d=json.load(open("versions.json")); print(d["app"])')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/ci-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --disableProvisioningProfiles \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER" \
            --disableExtensions

          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          shopt -s nullglob
          ipa_files=(bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Swiftgram.ipa)
          if [ ${#ipa_files[@]} -eq 0 ]; then
            echo "::error::Swiftgram.ipa was not produced"
            find bazel-out -name '*.ipa' -print || true
            exit 1
          fi
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Swiftgram.ipa; do
            cp "$f" "$OUTPUT_PATH/nameless.ipa"
          done

          mkdir -p build/DSYMs
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/*.dSYM; do
            cp -R "$f" build/DSYMs/
          done
          zip -r "./$OUTPUT_PATH/nameless.DSYMs.zip" build/DSYMs 1>/dev/null

      - name: Upload unsigned build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nameless-${{ env.APP_VERSION }}-${{ env.BUILD_NUMBER }}
          path: |
            /Users/Shared/telegram-ios/build/artifacts/nameless.ipa
            /Users/Shared/telegram-ios/build/artifacts/nameless.DSYMs.zip

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: nameless ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: unsigned iOS build of nameless ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          files: |
            /Users/Shared/telegram-ios/build/artifacts/nameless.ipa
            /Users/Shared/telegram-ios/build/artifacts/nameless.DSYMs.zip
