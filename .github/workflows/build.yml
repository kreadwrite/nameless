name: nameless iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set active Xcode path
        run: |
          set -euo pipefail
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          if [ -d "/Applications/Xcode_$XCODE_VERSION.app/Contents/Developer" ]; then
            sudo xcode-select -s "/Applications/Xcode_$XCODE_VERSION.app/Contents/Developer"
          else
            echo "::warning::Xcode_$XCODE_VERSION was not found. Available Xcode apps:"
            ls -1 /Applications | grep '^Xcode' || true
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Create canonical source directory
        run: |
          set -euo pipefail
          sudo mkdir -p /Users/Shared
          sudo rm -rf /Users/Shared/telegram-ios
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Patch submodules for FFmpeg 7.x compat
        run: |
          set -euo pipefail
          SOURCE_DIR=/Users/Shared/telegram-ios
          # reordered_opaque was removed from AVFrame/AVCodecContext in FFmpeg 7.x
          sed -i '' '/reordered_opaque/d' \
            "$SOURCE_DIR/third-party/webrtc/webrtc/modules/video_coding/codecs/h264/h264_decoder_impl.cc"

      - name: Set up build configuration repository
        run: |
          set -euo pipefail
          SOURCE_DIR=/Users/Shared/telegram-ios
          CONFIG_REPO="$SOURCE_DIR/build-input/configuration-repository"
          mkdir -p "$CONFIG_REPO/provisioning"
          echo 'module(name = "build_configuration",)' > "$CONFIG_REPO/MODULE.bazel"
          touch "$CONFIG_REPO/WORKSPACE" "$CONFIG_REPO/BUILD"
          cp "$SOURCE_DIR/build-system/fake-codesigning/profiles/"*.mobileprovision "$CONFIG_REPO/provisioning/"
          cd "$CONFIG_REPO/provisioning"
          printf 'exports_files([\n' > BUILD
          for f in *.mobileprovision; do printf '    "%s",\n' "$f" >> BUILD; done
          printf '])\n' >> BUILD
          cat > "$CONFIG_REPO/variables.bzl" << 'BZLEOF'
          def get_aps_environment():
              return "production"
          def use_xcode_managed_codesigning():
              return False
          BZLEOF
          # Delete Bazel lockfile to force re-resolution with local override
          rm -f "$SOURCE_DIR/MODULE.bazel.lock"

      - name: Build the App
        env:
          TELEGRAM_DISABLE_EXTENSIONS: '1'
        run: |
          set -euo pipefail

          # source code paths are included in the final binary, so we need to make them stable across builds
          SOURCE_DIR=/Users/Shared/telegram-ios

          # use canonical bazel root
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"

          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

          # Regenerate provisioning profiles with the fake certificate embedded,
          # then fix the keychain search list (GenerateProfiles creates/deletes
          # a temp keychain but leaves it in the search list)
          python3 -c "
          import sys, os, shutil, tempfile
          sys.path.insert(0, 'build-system/Make')
          import GenerateProfiles
          tmpdir = tempfile.mkdtemp()
          try:
              GenerateProfiles.generate_provisioning_profiles(
                  source_path='build-system/fake-codesigning/profiles',
                  destination_path=tmpdir,
                  certs_path='build-system/fake-codesigning/certs'
              )
              for f in os.listdir(tmpdir):
                  if f.endswith('.mobileprovision'):
                      shutil.copy2(os.path.join(tmpdir, f), 'build-system/fake-codesigning/profiles/' + f)
              print('Regenerated profiles with fake certificate')
          finally:
              shutil.rmtree(tmpdir)
          "
          # Fix keychain search list: remove the deleted temp keychain reference
          security list-keychains -d user | tr -d '"' | tr ' ' '\n' | sort -u | while read kc; do
            [ -f "$kc" ] && printf '%s\n' "$kc"
          done | xargs security list-keychains -d user -s

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER" \
            --disableExtensions

          # collect ipa
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          shopt -s nullglob
          ipa_files=(bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Swiftgram.ipa)
          if [ ${#ipa_files[@]} -eq 0 ]; then
            echo "::error::Swiftgram.ipa was not produced"
            find bazel-out -name '*.ipa' -print || true
            exit 1
          fi
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Swiftgram.ipa; do
            cp "$f" "$OUTPUT_PATH/nameless.ipa"
          done

          # collect dsym
          mkdir -p build/DSYMs
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/*.dSYM; do
            cp -R "$f" build/DSYMs/
          done
          zip -r "./$OUTPUT_PATH/nameless.DSYMs.zip" build/DSYMs 1>/dev/null

      - name: Upload unsigned build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nameless-${{ env.APP_VERSION }}-${{ env.BUILD_NUMBER }}
          path: |
            /Users/Shared/telegram-ios/build/artifacts/nameless.ipa
            /Users/Shared/telegram-ios/build/artifacts/nameless.DSYMs.zip

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: nameless ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: unsigned iOS build of nameless ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          files: |
            /Users/Shared/telegram-ios/build/artifacts/nameless.ipa
            /Users/Shared/telegram-ios/build/artifacts/nameless.DSYMs.zip
