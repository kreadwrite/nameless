name: nameless iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set active Xcode path
        run: |
          set -euo pipefail
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          if [ -d "/Applications/Xcode_$XCODE_VERSION.app/Contents/Developer" ]; then
            sudo xcode-select -s "/Applications/Xcode_$XCODE_VERSION.app/Contents/Developer"
          else
            echo "::warning::Xcode_$XCODE_VERSION was not found. Available Xcode apps:"
            ls -1 /Applications | grep '^Xcode' || true
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Create canonical source directory
        run: |
          set -euo pipefail
          sudo mkdir -p /Users/Shared
          sudo rm -rf /Users/Shared/telegram-ios
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Patch submodules for FFmpeg 7.x and LuxGram compat
        run: |
          set -euo pipefail
          SOURCE_DIR=/Users/Shared/telegram-ios
          # reordered_opaque was removed from AVFrame/AVCodecContext in FFmpeg 7.x
          sed -i '' '/reordered_opaque/d' \
            "$SOURCE_DIR/third-party/webrtc/webrtc/modules/video_coding/codecs/h264/h264_decoder_impl.cc"
          # Remove incompatible LuxSettingsUI dependency from PeerInfoScreen
          sed -i '' '/LuxSettingsUI/d' \
            "$SOURCE_DIR/submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen/BUILD"
          sed -i '' '/import LuxSettingsUI/d' \
            "$SOURCE_DIR/submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen/Sources/PeerInfoScreenSettingsActions.swift"
          # Replace luxGramSettingsController call with break (empty case is invalid Swift)
          sed -i '' 's/self.controller?.push(luxGramSettingsController(context: self.context))/break/' \
            "$SOURCE_DIR/submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen/Sources/PeerInfoScreenSettingsActions.swift"
          # Fix optional UIImage in PeerInfoScreenCommentItem
          sed -i '' 's/PresentationResourcesSettings.nameless.withRenderingMode(.alwaysOriginal)/PresentationResourcesSettings.nameless?.withRenderingMode(.alwaysOriginal)/' \
            "$SOURCE_DIR/submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen/Sources/ListItems/PeerInfoScreenCommentItem.swift"
          # Fix sgWebSettings not in scope in PeerInfoSettingsItems
          sed -i '' 's/sgWebSettings\.global\.canGrant/(context.currentAppConfiguration.with { $0 }).sgWebSettings.global.canGrant/' \
            "$SOURCE_DIR/submodules/TelegramUI/Components/PeerInfo/PeerInfoScreen/Sources/PeerInfoSettingsItems.swift"

      - name: Set up build configuration repository
        run: |
          set -euo pipefail
          SOURCE_DIR=/Users/Shared/telegram-ios
          CONFIG_REPO="$SOURCE_DIR/build-input/configuration-repository"
          mkdir -p "$CONFIG_REPO/provisioning"
          echo 'module(name = "build_configuration",)' > "$CONFIG_REPO/MODULE.bazel"
          touch "$CONFIG_REPO/WORKSPACE" "$CONFIG_REPO/BUILD"
          cp "$SOURCE_DIR/build-system/fake-codesigning/profiles/"*.mobileprovision "$CONFIG_REPO/provisioning/"
          cd "$CONFIG_REPO/provisioning"
          printf 'exports_files([\n' > BUILD
          for f in *.mobileprovision; do printf '    "%s",\n' "$f" >> BUILD; done
          printf '])\n' >> BUILD
          cat > "$CONFIG_REPO/variables.bzl" << 'BZLEOF'
          def get_aps_environment():
              return "production"
          def use_xcode_managed_codesigning():
              return False
          BZLEOF
          # Delete Bazel lockfile to force re-resolution with local override
          rm -f "$SOURCE_DIR/MODULE.bazel.lock"

      - name: Setup code signing and regenerate profiles
        run: |
          SOURCE_DIR=/Users/Shared/telegram-ios
          cd $SOURCE_DIR

          # Step 1: Use GenerateProfiles.py to re-sign profiles with self-signed cert
          python3 -c "
          import sys; sys.path.insert(0, 'build-system/Make')
          from GenerateProfiles import generate_provisioning_profiles
          generate_provisioning_profiles(
            source_path='build-system/fake-codesigning/profiles',
            destination_path='build-system/fake-codesigning/profiles',
            certs_path='build-system/fake-codesigning/certs'
          )
          "


          # Step 2.5: Patch provisioning profiles to remove TeamIdentifier mismatch
          # GenerateProfiles re-signs profiles but leaves original TeamIdentifier (C67CF9S4VU)
          # which doesn't match the self-signed cert. Patch them to accept any identity.
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" 2>/dev/null | head -1 | sed 's/.*"\(.*\)"$/\1/')
          echo "Patching profiles with identity: $SIGNING_IDENTITY"
          python3 -c "
import plistlib, subprocess, tempfile, os
profiles_dir = 'build-system/fake-codesigning/profiles'
identity = '$SIGNING_IDENTITY'
for fname in sorted(os.listdir(profiles_dir)):
    if not fname.endswith('.mobileprovision'): continue
    fpath = os.path.join(profiles_dir, fname)
    r2 = subprocess.run(['security','cms','-D','-i',fpath], capture_output=True, text=True)
    if r2.returncode != 0: continue
    plist = plistlib.loads(r2.stdout.encode())
    plist['TeamIdentifier'] = []
    plist['TeamName'] = ['Organization']
    if 'Entitlements' in plist:
        plist['Entitlements'].pop('com.apple.developer.team-identifier', None)
    tmp = tempfile.mktemp(suffix='.plist')
    with open(tmp,'wb') as f: plistlib.dump(plist, f, format=plistlib.FMT_XML)
    r3 = subprocess.run(['security','cms','-S','-N',identity,'-i',tmp,'-o',fpath], capture_output=True, text=True)
    os.unlink(tmp)
    print(f'  Patched {fname}')
print('All profiles patched.')
"

          # Step 2: Clean up stale keychain refs left by GenerateProfiles
          security list-keychains -d user -s "$HOME/Library/Keychains/login.keychain-db"

          # Step 3: Create our own keychain and import cert for the build
          KEYCHAIN_PATH="$HOME/Library/Keychains/signing.keychain-db"
          KEYCHAIN_PASSWORD="secret"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import build-system/fake-codesigning/certs/SelfSigned.p12 \
            -k "$KEYCHAIN_PATH" -P '' \
            -T /usr/bin/codesign -T /usr/bin/security
          security import build-system/AppleWWDRCAG3.cer \
            -k "$KEYCHAIN_PATH" -P '' \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list \
            -S 'apple-tool:,apple:' \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Step 4: Set search list to ONLY our keychain
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          echo "=== Keychain identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          echo "=== Keychain list ==="
          security list-keychains -d user || true

      - name: Build the App
        run: |
          set -euo pipefail

          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"
          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER" \
            --disableExtensions

          # collect ipa
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          shopt -s nullglob
          ipa_files=(bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Swiftgram.ipa)
          if [ ${#ipa_files[@]} -eq 0 ]; then
            echo "::error::Swiftgram.ipa was not produced"
            find bazel-out -name '*.ipa' -print || true
            exit 1
          fi
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Swiftgram.ipa; do
            cp "$f" "$OUTPUT_PATH/nameless.ipa"
          done

          # collect dsym
          mkdir -p build/DSYMs
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/*.dSYM; do
            cp -R "$f" build/DSYMs/
          done
          zip -r "./$OUTPUT_PATH/nameless.DSYMs.zip" build/DSYMs 1>/dev/null

      - name: Upload unsigned build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nameless-${{ env.APP_VERSION }}-${{ env.BUILD_NUMBER }}
          path: |
            /Users/Shared/telegram-ios/build/artifacts/nameless.ipa
            /Users/Shared/telegram-ios/build/artifacts/nameless.DSYMs.zip

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: nameless ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: unsigned iOS build of nameless ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          files: |
            /Users/Shared/telegram-ios/build/artifacts/nameless.ipa
            /Users/Shared/telegram-ios/build/artifacts/nameless.DSYMs.zip
